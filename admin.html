<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin · Charraiá do Theo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="arraial.css" />
  <link rel="stylesheet" href="admin.css" />
</head>
<body class="admin-body">

  <div id="admin-login" class="admin-login" hidden>
    <div class="admin-login-card">
      <p class="eyebrow">Charraiá do Theo</p>
      <h1>Confirmados</h1>
      <p class="admin-login-hint">Digite a senha para ver quem já confirmou presença.</p>
      <form id="admin-login-form" class="admin-login-form" autocomplete="off">
        <label class="admin-login-label" for="admin-password">Senha</label>
        <input type="password" id="admin-password" class="admin-login-input" placeholder="••••••••" required />
        <p class="admin-login-error" id="admin-login-error" hidden>Senha incorreta. Tenta de novo.</p>
        <button type="submit" class="btn-fill admin-login-submit">Entrar</button>
      </form>
      <a class="admin-back-link" href="/">← Voltar ao site</a>
    </div>
  </div>

  <div id="admin-app" class="admin-app" hidden>
    <header class="admin-top">
      <div>
        <a class="admin-back-link admin-back-link--top" href="/">← Voltar ao site</a>
        <p class="eyebrow">Charraiá do Theo</p>
        <h1 class="admin-title">Confirmados <span class="emo">🌽</span></h1>
      </div>
      <button type="button" class="btn-ghost admin-refresh" id="admin-refresh">Atualizar</button>
    </header>

    <div class="admin-summary" id="admin-summary"></div>

    <section class="admin-section">
      <h2 class="admin-section-title">Quem confirmou</h2>
      <div class="admin-table-wrap" id="admin-rows-table"></div>
      <div class="admin-cards" id="admin-rows-cards"></div>
    </section>

    <section class="admin-section">
      <h2 class="admin-section-title">Estoque da lista</h2>
      <div class="admin-table-wrap" id="admin-stock-table"></div>
    </section>

    <div class="admin-actions">
      <button type="button" class="btn-fill" id="admin-export">Exportar CSV</button>
      <a class="btn-ghost admin-sheet-link" id="admin-sheet-link" href="#" target="_blank" rel="noopener" hidden>Abrir planilha ↗</a>
    </div>
  </div>

  <p class="admin-loading" id="admin-loading">Carregando…</p>

  <div class="admin-modal" id="admin-edit-modal" hidden>
    <div class="admin-modal-backdrop" data-close-modal></div>
    <div class="admin-modal-card" role="dialog" aria-modal="true" aria-labelledby="admin-edit-title">
      <h2 class="admin-modal-title" id="admin-edit-title">Editar confirmação</h2>
      <form id="admin-edit-form" class="admin-edit-form">
        <input type="hidden" id="edit-rsvp-id" />
        <label class="admin-edit-label" for="edit-name">Nome</label>
        <input type="text" id="edit-name" class="admin-edit-input" required />
        <label class="admin-edit-label" for="edit-guests">Quantas pessoas vêm</label>
        <input type="number" id="edit-guests" class="admin-edit-input" min="1" max="20" required />
        <label class="admin-edit-label" for="edit-diet">Restrição alimentar</label>
        <input type="text" id="edit-diet" class="admin-edit-input" placeholder="Opcional" />
        <fieldset class="admin-edit-fieldset">
          <legend class="admin-edit-label">Presente</legend>
          <label class="admin-edit-radio">
            <input type="radio" name="edit-gift-mode" value="lista" />
            Lista de presentes
          </label>
          <label class="admin-edit-radio">
            <input type="radio" name="edit-gift-mode" value="email" />
            PIX (email) 🤍
          </label>
        </fieldset>
        <div class="admin-edit-gifts" id="edit-gifts-panel" hidden>
          <label class="admin-edit-label">Itens da lista</label>
          <div class="admin-edit-gifts-list" id="edit-gifts-list"></div>
          <div class="admin-gift-add">
            <select id="edit-gift-add-select" class="admin-edit-input" aria-label="Adicionar presente">
              <option value="">Escolher presente…</option>
            </select>
            <button type="button" class="admin-btn" id="edit-gift-add-btn">Adicionar</button>
          </div>
        </div>
        <p class="admin-edit-note" id="edit-gifts-note" hidden></p>
        <p class="admin-edit-error" id="edit-error" hidden></p>
        <div class="admin-modal-actions">
          <button type="button" class="btn-ghost" data-close-modal>Cancelar</button>
          <button type="submit" class="btn-fill">Salvar</button>
        </div>
      </form>
    </div>
  </div>

  <script src="charraia-shared.js"></script>
  <script src="gifts-catalog.js"></script>
  <script src="api-client.js"></script>
  <script src="admin.js"></script>
</body>
</html>
